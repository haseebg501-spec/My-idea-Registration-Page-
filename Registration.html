<!DOCTYPE html>
<html>
<head>
	<title>Sign Up</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
	
	<div class="container">
		<section>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
			<span></span>
		</section>
		<h1>Registration</h1>
		<div class="row100">
			<div class="col">
				<div class="inputbox">
					<input type="text" name="" required="required">
					<span class="text">First Name</span>
					<span class="line"></span>
				</div>
			</div>
			<div class="col">
			 	<div class="inputbox">
					<input type="text" name="" required="required">
					<span class="text">Last Name</span>
					<span class="line"></span>
				</div>
			</div>
		</div>

		<div class="row100">
			<div class="col">
				<div class="inputbox">
					<input type="Email" name="" required="required">
					<span class="text">Email</span>
					<span class="line"></span>
				</div>
			</div>
			<div class="col">
			 	<div class="inputbox">
					<input type="Phone" name="" required="required" maxlength="11">
					<span class="text">Mobile No.</span>
					<span class="line"></span>
				</div>
			</div>
		</div>

		<div class="row100">
			<div class="col">
				<div class="inputbox">
					<input type="Password" name="" required="required" maxlength="10">
					<span class="text">Password</span>
					<span class="line"></span>
				</div>
			</div>
		</div>
		<div class="row100">
			<div class="col">
				<div class="inputbox">
					<input type="Password" name="" required="required" maxlength="10">
					<span class="text">Retype-Password</span>
					<span class="line"></span>
				</div>
			</div>
		</div class="submit">
			<a href="#" class="button">
				<span></span>
				<span></span>
				<span></span>
				<span></span>
				Submit
			</a>
	</div>



</body>
</html>
